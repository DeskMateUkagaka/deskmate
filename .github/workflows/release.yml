name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
      python_version:
        description: "Python version (e.g. 3.13)"
        required: false
        default: "3.13"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC developer environment (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install ${{ inputs.python_version }}

      - name: Create venv and install dependencies
        run: |
          uv venv -p ${{ inputs.python_version }}
          uv pip install -r app/requirements.txt
          uv pip install typer
          uv pip install pip

      - name: Build release
        run: uv run python scripts/release.py --version ${{ inputs.version }} --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deskmate-${{ inputs.version }}-${{ matrix.target }}
          path: dist/release/deskmate-*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "DeskMate v${{ inputs.version }}" \
            --generate-notes \
            artifacts/deskmate-*
